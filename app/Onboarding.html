<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Masterly — Welcome</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { fontFamily: {
    sans: ['Geist', 'ui-sans-serif', 'system-ui', 'sans-serif'],
    mono: ['Geist Mono', 'ui-monospace', 'monospace'],
  }}}};
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg: oklch(0.992 0.004 95);
    --bg-warm: oklch(0.975 0.012 88);
    --surface: #ffffff;
    --ink: oklch(0.22 0.012 80);
    --ink-soft: oklch(0.46 0.012 80);
    --ink-mute: oklch(0.66 0.010 80);
    --line: oklch(0.92 0.006 85);
    --line-strong: oklch(0.85 0.008 85);
    --accent: oklch(0.62 0.14 155);
    --accent-ink: oklch(0.32 0.10 155);
    --accent-tint: oklch(0.95 0.04 155);
    --danger: oklch(0.58 0.18 25);
    --warn: oklch(0.70 0.13 70);
  }
  html, body, #root { min-height: 100%; }
  body {
    background: var(--bg-warm);
    color: var(--ink);
    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
    font-feature-settings: 'ss01', 'cv11';
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  *::selection { background: color-mix(in oklch, var(--accent) 30%, transparent); }

  .tp-mark {
    width: 28px; height: 28px;
    background: var(--ink); color: oklch(0.99 0.01 90);
    border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Geist Mono', monospace;
    font-weight: 600; font-size: 14px; letter-spacing: -0.04em;
  }
  .eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--ink-mute);
  }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    height: 44px; padding: 0 20px;
    border-radius: 10px;
    font-size: 14px; font-weight: 500;
    letter-spacing: -0.005em;
    transition: background .15s ease, border-color .15s ease, transform .08s ease;
  }
  .btn-lg { height: 50px; padding: 0 28px; font-size: 15px; }
  .btn-primary { background: var(--ink); color: #fff; box-shadow: 0 1px 0 rgba(255,255,255,.06) inset, 0 1px 2px rgba(0,0,0,.08); }
  .btn-primary:hover:not(:disabled) { background: oklch(0.30 0.012 80); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-ghost { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  .btn-ghost:hover { border-color: var(--line-strong); background: oklch(0.985 0.005 88); }
  .btn-text {
    background: transparent; color: var(--ink-soft);
    height: 36px; padding: 0 10px;
    transition: color .15s ease;
  }
  .btn-text:hover { color: var(--ink); }

  /* Step dots */
  .step-dot {
    width: 24px; height: 3px; border-radius: 999px;
    background: oklch(0.92 0.006 85);
    transition: background .35s ease, width .35s ease;
  }
  .step-dot[data-state="done"]   { background: var(--accent); }
  .step-dot[data-state="active"] { background: var(--ink); width: 40px; }

  /* Goal card */
  .goal-card {
    display: grid;
    grid-template-columns: 36px 1fr 24px;
    gap: 14px;
    align-items: center;
    padding: 16px 18px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease, transform .12s ease, box-shadow .15s ease;
    width: 100%;
    text-align: left;
    color: var(--ink);
    font: inherit;
  }
  .goal-card:hover { border-color: var(--line-strong); transform: translateY(-1px); }
  .goal-card[data-selected="true"] {
    border-color: var(--accent);
    background: color-mix(in oklch, var(--accent-tint) 70%, #fff);
    box-shadow: 0 0 0 3px var(--accent-tint);
  }
  .goal-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: oklch(0.96 0.006 88);
    color: var(--ink-soft);
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .15s ease, color .15s ease;
  }
  .goal-card[data-selected="true"] .goal-icon {
    background: var(--accent); color: #fff;
  }
  .goal-check {
    width: 22px; height: 22px;
    border-radius: 999px;
    border: 1.5px solid var(--line-strong);
    transition: background .15s ease, border-color .15s ease;
    display: inline-flex; align-items: center; justify-content: center;
    color: transparent;
  }
  .goal-card[data-selected="true"] .goal-check {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }

  /* Slider */
  .slider {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 6px;
    background: oklch(0.93 0.006 85);
    border-radius: 999px;
    outline: none;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px;
    border-radius: 999px;
    background: var(--ink);
    cursor: pointer;
    box-shadow: 0 0 0 4px #fff, 0 0 0 5px var(--ink);
    transition: transform .12s ease;
  }
  .slider::-webkit-slider-thumb:active { transform: scale(1.1); }
  .slider::-moz-range-thumb {
    width: 22px; height: 22px;
    border-radius: 999px;
    background: var(--ink);
    cursor: pointer;
    border: 4px solid #fff;
    box-shadow: 0 0 0 1px var(--ink);
  }

  /* Self-assessment row */
  .sa-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
    padding: 14px 16px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
  }
  .sa-seg {
    display: inline-flex;
    background: oklch(0.96 0.006 88);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 2px;
    gap: 2px;
  }
  .sa-seg button {
    height: 30px; padding: 0 12px;
    border-radius: 7px;
    font-size: 12px; font-weight: 500;
    color: var(--ink-soft);
    transition: background .15s ease, color .15s ease;
    font-family: 'Geist Mono', monospace;
    letter-spacing: -0.005em;
  }
  .sa-seg button[data-active="true"] {
    background: #fff; color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,.05);
  }

  /* Stage transitions */
  @keyframes stage-enter {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .stage-enter { animation: stage-enter .5s cubic-bezier(.2,.7,.2,1) both; }

  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .rise { animation: rise .45s cubic-bezier(.2,.7,.2,1) both; }
  .rise-stagger > * { animation: rise .45s cubic-bezier(.2,.7,.2,1) both; }
  .rise-stagger > *:nth-child(1) { animation-delay: .04s; }
  .rise-stagger > *:nth-child(2) { animation-delay: .09s; }
  .rise-stagger > *:nth-child(3) { animation-delay: .14s; }
  .rise-stagger > *:nth-child(4) { animation-delay: .19s; }
  .rise-stagger > *:nth-child(5) { animation-delay: .24s; }
  .rise-stagger > *:nth-child(6) { animation-delay: .29s; }
  .rise-stagger > *:nth-child(7) { animation-delay: .34s; }
  .rise-stagger > *:nth-child(8) { animation-delay: .39s; }

  /* Drifting decorative shapes for welcome screen */
  @keyframes drift {
    from { transform: translate(0,0) rotate(0deg); }
    to   { transform: translate(var(--dx), var(--dy)) rotate(360deg); }
  }
  .drift {
    position: absolute;
    border-radius: 5px;
    opacity: 0.35;
    animation: drift var(--d, 28s) linear infinite alternate;
  }

  /* Grid background */
  .grid-bg {
    background-image:
      linear-gradient(to right, color-mix(in oklch, var(--ink) 5%, transparent) 1px, transparent 1px),
      linear-gradient(to bottom, color-mix(in oklch, var(--ink) 5%, transparent) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, #000 30%, transparent 100%);
  }

  /* Generation status line */
  .gen-line {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 12px 16px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    transition: opacity .25s ease;
  }
  .gen-line[data-state="pending"] { opacity: 0.5; }
  .gen-spinner-dot {
    width: 18px; height: 18px;
    border-radius: 999px;
    border: 2px solid var(--line);
    border-top-color: var(--ink);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Confetti pills */
  @keyframes pill-rise {
    0%   { opacity: 0; transform: translate(var(--from-x), 80px) rotate(0deg); }
    20%  { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--to-x), -240px) rotate(var(--rot)); }
  }
  .pill-burst {
    position: absolute; pointer-events: none;
    bottom: 0; left: 50%;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: var(--accent-ink);
    background: #fff;
    border: 1px solid color-mix(in oklch, var(--accent) 30%, transparent);
    border-radius: 999px;
    padding: 3px 10px;
    box-shadow: 0 4px 14px -4px rgba(0,0,0,.18);
    animation: pill-rise var(--dur, 2.4s) ease-out forwards;
    animation-delay: var(--delay, 0s);
  }

  .container-narrow {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 24px;
  }
  .container-wide {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .topbar-thin {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="dashboard-data.jsx"></script>
  <script type="text/babel" src="dashboard-widgets.jsx"></script>
  <script type="text/babel" src="onboarding-app.jsx"></script>
</body>
</html>
