<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Training Platform — Practice</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { fontFamily: {
      sans: ['Geist', 'ui-sans-serif', 'system-ui', 'sans-serif'],
      mono: ['Geist Mono', 'ui-monospace', 'monospace'],
    }}},
  };
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg: oklch(0.992 0.004 95);
    --bg-warm: oklch(0.975 0.012 88);
    --surface: #ffffff;
    --ink: oklch(0.22 0.012 80);
    --ink-soft: oklch(0.46 0.012 80);
    --ink-mute: oklch(0.66 0.010 80);
    --line: oklch(0.92 0.006 85);
    --line-strong: oklch(0.85 0.008 85);
    --accent: oklch(0.62 0.14 155);
    --accent-ink: oklch(0.32 0.10 155);
    --accent-tint: oklch(0.95 0.04 155);
    --danger: oklch(0.58 0.18 25);
    --danger-tint: oklch(0.96 0.04 25);
    --warn: oklch(0.70 0.13 70);
  }
  html, body, #root { min-height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
    font-feature-settings: 'ss01', 'cv11';
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  *::selection { background: color-mix(in oklch, var(--accent) 30%, transparent); }

  .tp-mark {
    width: 28px; height: 28px;
    background: var(--ink);
    color: oklch(0.99 0.01 90);
    border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Geist Mono', monospace;
    font-weight: 600; font-size: 14px; letter-spacing: -0.04em;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 18px;
  }
  .eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-mute);
  }
  .topic-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px;
    border-radius: 999px;
    background: oklch(0.965 0.006 88);
    border: 1px solid var(--line);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: -0.01em;
    white-space: nowrap;
  }

  /* Buttons (shared) */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    height: 40px; padding: 0 16px;
    border-radius: 10px;
    font-size: 14px; font-weight: 500;
    letter-spacing: -0.005em;
    transition: background .15s ease, border-color .15s ease, transform .08s ease;
  }
  .btn-lg { height: 46px; padding: 0 22px; font-size: 14.5px; }
  .btn-primary {
    background: var(--ink); color: #fff;
    box-shadow: 0 1px 0 rgba(255,255,255,.06) inset, 0 1px 2px rgba(0,0,0,.08);
  }
  .btn-primary:hover:not(:disabled) { background: oklch(0.30 0.012 80); }
  .btn-primary:active:not(:disabled) { transform: translateY(0.5px); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-ghost {
    background: #fff; color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn-ghost:hover { border-color: var(--line-strong); background: oklch(0.985 0.005 88); }
  .btn-soft {
    background: var(--accent-tint); color: var(--accent-ink);
  }
  .btn-icon {
    width: 36px; height: 36px; padding: 0;
    background: #fff; color: var(--ink-soft);
    border: 1px solid var(--line);
    border-radius: 10px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .btn-icon:hover { background: oklch(0.985 0.005 88); color: var(--ink); border-color: var(--line-strong); }

  /* Option card (MC) */
  .opt {
    display: grid;
    grid-template-columns: 38px 1fr 24px;
    gap: 14px;
    align-items: center;
    padding: 16px 18px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    cursor: pointer;
    text-align: left;
    transition: border-color .15s ease, background .15s ease, transform .12s ease, box-shadow .15s ease;
    font: inherit;
    color: var(--ink);
    width: 100%;
  }
  .opt:hover { border-color: var(--line-strong); transform: translateY(-1px); }
  .opt[data-selected="true"] {
    border-color: var(--ink);
    background: oklch(0.985 0.004 90);
    box-shadow: 0 0 0 3px oklch(0.93 0.01 85);
  }
  .opt[data-state="correct"] {
    border-color: color-mix(in oklch, var(--accent) 60%, transparent);
    background: color-mix(in oklch, var(--accent-tint) 80%, white);
    box-shadow: 0 0 0 3px var(--accent-tint);
  }
  .opt[data-state="incorrect"] {
    border-color: color-mix(in oklch, var(--danger) 50%, transparent);
    background: color-mix(in oklch, var(--danger-tint) 80%, white);
    box-shadow: 0 0 0 3px var(--danger-tint);
  }
  .opt[data-state="missed"] {
    border-style: dashed;
    border-color: color-mix(in oklch, var(--accent) 50%, transparent);
  }
  .opt[disabled] { cursor: default; }

  .opt-letter {
    width: 32px; height: 32px;
    border-radius: 9px;
    background: oklch(0.965 0.006 88);
    border: 1px solid var(--line);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Geist Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .opt[data-selected="true"] .opt-letter {
    background: var(--ink); color: #fff; border-color: var(--ink);
  }
  .opt[data-state="correct"] .opt-letter {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .opt[data-state="incorrect"] .opt-letter {
    background: var(--danger); color: #fff; border-color: var(--danger);
  }
  .opt[data-state="missed"] .opt-letter {
    background: var(--accent-tint); color: var(--accent-ink); border-color: color-mix(in oklch, var(--accent) 40%, transparent);
  }

  /* Free text area */
  .tp-text {
    width: 100%;
    padding: 14px 16px;
    background: #fff;
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 12px;
    font: inherit;
    font-size: 14.5px;
    line-height: 1.55;
    resize: vertical;
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .tp-text:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 18%, transparent);
  }
  .tp-text::placeholder { color: var(--ink-mute); }

  /* Stepper at top */
  .stepper {
    display: flex; gap: 4px; align-items: center;
    flex: 1;
  }
  .stepper i {
    flex: 1;
    height: 4px;
    border-radius: 999px;
    background: oklch(0.94 0.006 85);
    transition: background .35s ease;
  }
  .stepper i[data-state="done"] { background: var(--accent); }
  .stepper i[data-state="active"] { background: var(--ink); }

  /* Difficulty pip row */
  .difpip { display: inline-flex; gap: 3px; align-items: center; }
  .difpip i { width: 6px; height: 6px; border-radius: 999px; background: oklch(0.88 0.006 85); }
  .difpip i[data-on="true"] { background: var(--ink); }

  .hr { height: 1px; background: var(--line); }

  /* Topbar */
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: color-mix(in oklch, var(--bg) 80%, transparent);
    backdrop-filter: saturate(160%) blur(14px);
    -webkit-backdrop-filter: saturate(160%) blur(14px);
    border-bottom: 1px solid var(--line);
  }

  /* Mastery delta bar */
  .mbar { height: 8px; border-radius: 999px; background: oklch(0.94 0.006 85); overflow: hidden; position: relative; }
  .mbar > i { display: block; height: 100%; border-radius: 999px; background: var(--accent); transition: width 1.1s cubic-bezier(.2,.7,.2,1); }
  .mbar .ghost { position: absolute; inset: 0; }
  .mbar .ghost > i { display: block; height: 100%; border-radius: 999px; background: oklch(0.88 0.04 80); }

  /* Result banner */
  .banner {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 16px 18px;
    border-radius: 14px;
  }
  .banner-correct {
    background: var(--accent-tint);
    border: 1px solid color-mix(in oklch, var(--accent) 30%, transparent);
    color: var(--accent-ink);
  }
  .banner-incorrect {
    background: var(--danger-tint);
    border: 1px solid color-mix(in oklch, var(--danger) 25%, transparent);
    color: oklch(0.42 0.15 25);
  }

  /* Slide-in */
  @keyframes slide-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .slide-up { animation: slide-up .42s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .rise { animation: rise .45s cubic-bezier(.2,.7,.2,1) both; }

  /* Burst (subtle on correct) */
  @keyframes burst { 0% { opacity: 0; transform: scale(.7); } 60% { opacity: 1; transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
  .burst { animation: burst .6s cubic-bezier(.2,.7,.2,1) both; }

  /* Skeleton */
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .skel { background: linear-gradient(90deg, oklch(0.95 0.006 88) 0%, oklch(0.97 0.006 88) 50%, oklch(0.95 0.006 88) 100%); background-size: 200% 100%; animation: shimmer 1.4s linear infinite; border-radius: 8px; }

  /* Mono code blocks */
  .codey { font-family: 'Geist Mono', monospace; font-size: 12.5px; color: var(--ink); }
  kbd {
    font-family: 'Geist Mono', monospace; font-size: 11px;
    background: #fff; border: 1px solid var(--line);
    padding: 1.5px 6px; border-radius: 5px;
    box-shadow: 0 1px 0 rgba(0,0,0,.04);
    color: var(--ink-soft);
  }

  .container-x { max-width: 760px; margin: 0 auto; padding: 0 28px; }
  @media (max-width: 700px) { .container-x { padding: 0 16px; } }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="dashboard-data.jsx"></script>
  <script type="text/babel" src="dashboard-widgets.jsx"></script>
  <script type="text/babel" src="practice-app.jsx"></script>
</body>
</html>
