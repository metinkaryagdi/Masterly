<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Masterly — Settings</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { fontFamily: {
    sans: ['Geist', 'ui-sans-serif', 'system-ui', 'sans-serif'],
    mono: ['Geist Mono', 'ui-monospace', 'monospace'],
  }}}};
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg: oklch(0.992 0.004 95);
    --bg-warm: oklch(0.975 0.012 88);
    --surface: #ffffff;
    --ink: oklch(0.22 0.012 80);
    --ink-soft: oklch(0.46 0.012 80);
    --ink-mute: oklch(0.66 0.010 80);
    --line: oklch(0.92 0.006 85);
    --line-strong: oklch(0.85 0.008 85);
    --accent: oklch(0.62 0.14 155);
    --accent-ink: oklch(0.32 0.10 155);
    --accent-tint: oklch(0.95 0.04 155);
    --danger: oklch(0.58 0.18 25);
    --danger-tint: oklch(0.96 0.04 25);
    --warn: oklch(0.70 0.13 70);
  }
  html, body, #root { min-height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
    font-feature-settings: 'ss01', 'cv11';
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  *::selection { background: color-mix(in oklch, var(--accent) 30%, transparent); }

  .tp-mark { width: 28px; height: 28px; background: var(--ink); color: oklch(0.99 0.01 90); border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-family: 'Geist Mono', monospace; font-weight: 600; font-size: 14px; letter-spacing: -0.04em; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; }
  .eyebrow { font-family: 'Geist Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-mute); }

  .topbar { position: sticky; top: 0; z-index: 10; background: color-mix(in oklch, var(--bg) 80%, transparent); backdrop-filter: saturate(160%) blur(14px); -webkit-backdrop-filter: saturate(160%) blur(14px); border-bottom: 1px solid var(--line); }

  .nav-tab { position: relative; padding: 8px 12px; border-radius: 8px; font-size: 13.5px; font-weight: 500; color: var(--ink-soft); transition: color .15s ease, background .15s ease; }
  .nav-tab:hover { color: var(--ink); }
  .nav-tab[data-active="true"] { color: var(--ink); background: oklch(0.95 0.006 88); }
  .nav-tab[data-active="true"]::after { content: ''; position: absolute; left: 12px; right: 12px; bottom: -1px; height: 2px; background: var(--ink); border-radius: 2px; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; height: 36px; padding: 0 14px; border-radius: 9px; font-size: 13.5px; font-weight: 500; letter-spacing: -0.005em; transition: background .15s ease, border-color .15s ease, transform .08s ease; }
  .btn-primary { background: var(--ink); color: #fff; box-shadow: 0 1px 0 rgba(255,255,255,.06) inset, 0 1px 2px rgba(0,0,0,.08); }
  .btn-primary:hover:not(:disabled) { background: oklch(0.30 0.012 80); }
  .btn-ghost { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  .btn-ghost:hover { border-color: var(--line-strong); background: oklch(0.985 0.005 88); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: oklch(0.52 0.20 25); }
  .btn-danger-ghost { background: #fff; color: var(--danger); border: 1px solid color-mix(in oklch, var(--danger) 35%, transparent); }
  .btn-danger-ghost:hover { background: var(--danger-tint); }
  .btn-icon { width: 32px; height: 32px; padding: 0; background: #fff; color: var(--ink-soft); border: 1px solid var(--line); border-radius: 9px; display: inline-flex; align-items: center; justify-content: center; transition: background .15s ease, color .15s ease; }
  .btn-icon:hover { background: oklch(0.985 0.005 88); color: var(--ink); }

  .avatar { width: 30px; height: 30px; border-radius: 999px; background: linear-gradient(135deg, oklch(0.7 0.10 160), oklch(0.55 0.13 220)); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-family: 'Geist Mono', monospace; font-size: 11.5px; font-weight: 600; letter-spacing: -0.02em; }
  .avatar-lg { width: 64px; height: 64px; font-size: 22px; }

  .container-x { max-width: 1100px; margin: 0 auto; padding: 0 28px; }
  @media (max-width: 980px) { .container-x { padding: 0 16px; } }

  /* Section header */
  .sec-head { padding: 22px 24px 16px; }
  .sec-body { padding: 6px 24px 22px; }

  /* Row */
  .row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
    gap: 24px;
    padding: 16px 0;
    border-top: 1px solid var(--line);
    align-items: flex-start;
  }
  .row:first-child { border-top: 0; padding-top: 4px; }
  .row-lbl { font-size: 13.5px; font-weight: 500; color: var(--ink); letter-spacing: -0.005em; }
  .row-hint { font-size: 12.5px; color: var(--ink-soft); margin-top: 4px; line-height: 1.5; }

  /* Inline edit input */
  .inline-input {
    width: 100%;
    height: 40px;
    padding: 0 12px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 9px;
    font: inherit;
    font-size: 14px;
    color: var(--ink);
    transition: border-color .15s ease, box-shadow .15s ease;
    outline: none;
  }
  .inline-input:hover { border-color: var(--line-strong); }
  .inline-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 18%, transparent); }
  .inline-input[readonly] { background: oklch(0.97 0.006 88); color: var(--ink-soft); cursor: default; }

  /* Slider */
  .slider {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 6px;
    background: oklch(0.93 0.006 85);
    border-radius: 999px;
    outline: none;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 20px; height: 20px;
    border-radius: 999px;
    background: var(--ink);
    cursor: pointer;
    box-shadow: 0 0 0 4px #fff, 0 0 0 5px var(--ink);
  }
  .slider::-moz-range-thumb {
    width: 20px; height: 20px;
    border-radius: 999px;
    background: var(--ink);
    cursor: pointer;
    border: 4px solid #fff;
    box-shadow: 0 0 0 1px var(--ink);
  }

  /* Toggle */
  .toggle {
    width: 38px; height: 22px;
    border-radius: 999px;
    background: oklch(0.9 0.006 85);
    position: relative;
    transition: background .2s ease;
    cursor: pointer;
    flex-shrink: 0;
  }
  .toggle::after {
    content: ''; position: absolute;
    width: 18px; height: 18px;
    border-radius: 999px;
    background: #fff;
    top: 2px; left: 2px;
    box-shadow: 0 1px 2px rgba(0,0,0,.15);
    transition: left .2s ease, background .2s ease;
  }
  .toggle[data-on="true"] { background: var(--accent); }
  .toggle[data-on="true"]::after { left: 18px; }

  /* Multi-select goal chip */
  .goal-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    border-radius: 999px;
    background: #fff;
    border: 1px solid var(--line);
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease, color .15s ease;
  }
  .goal-pill:hover { border-color: var(--line-strong); color: var(--ink); }
  .goal-pill[data-selected="true"] {
    background: var(--accent-tint);
    color: var(--accent-ink);
    border-color: color-mix(in oklch, var(--accent) 40%, transparent);
  }
  .goal-pill .chk {
    width: 14px; height: 14px;
    border-radius: 999px;
    border: 1.5px solid currentColor;
    opacity: 0.4;
    display: inline-flex; align-items: center; justify-content: center;
    transition: opacity .15s, background .15s;
  }
  .goal-pill[data-selected="true"] .chk { background: var(--accent); border-color: var(--accent); opacity: 1; color: #fff; }

  /* Accent swatch picker */
  .swatch {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px 8px 8px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 999px;
    cursor: pointer;
    transition: border-color .15s ease;
    font-size: 12.5px;
    color: var(--ink-soft);
  }
  .swatch:hover { border-color: var(--line-strong); }
  .swatch[data-selected="true"] { border-color: var(--ink); color: var(--ink); }
  .swatch .dot {
    width: 18px; height: 18px;
    border-radius: 999px;
    box-shadow: 0 0 0 2px #fff, 0 0 0 3px var(--line-strong);
  }
  .swatch[data-selected="true"] .dot {
    box-shadow: 0 0 0 2px #fff, 0 0 0 3px var(--ink);
  }

  /* Self-assessment segmented */
  .sa-seg { display: inline-flex; background: oklch(0.96 0.006 88); border: 1px solid var(--line); border-radius: 9px; padding: 2px; gap: 2px; }
  .sa-seg button { height: 28px; padding: 0 12px; border-radius: 7px; font-size: 11.5px; font-weight: 500; color: var(--ink-soft); transition: background .15s ease, color .15s ease; font-family: 'Geist Mono', monospace; letter-spacing: -0.005em; }
  .sa-seg button[data-active="true"] { background: #fff; color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.05); }

  .sa-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 16px;
    align-items: center;
    padding: 10px 12px;
    border-radius: 10px;
    transition: background .15s ease;
  }
  .sa-row:hover { background: oklch(0.985 0.006 88); }

  /* Saved tag */
  @keyframes fade-out { 0%, 70% { opacity: 1; } 100% { opacity: 0; transform: translateY(-3px); } }
  .saved {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: 'Geist Mono', monospace;
    font-size: 10.5px;
    color: var(--accent-ink);
    background: var(--accent-tint);
    padding: 2px 7px;
    border-radius: 999px;
    animation: fade-out 1.6s ease forwards;
  }

  /* Left rail nav */
  .rail {
    position: sticky; top: 84px;
    align-self: start;
  }
  .rail a {
    display: block;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--ink-soft);
    text-decoration: none;
    transition: background .15s ease, color .15s ease;
    cursor: pointer;
  }
  .rail a:hover { color: var(--ink); background: oklch(0.985 0.006 88); }
  .rail a[data-active="true"] { color: var(--ink); background: oklch(0.95 0.006 88); font-weight: 500; }
  .rail .lbl-num { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--ink-mute); margin-right: 8px; }

  /* Danger zone card */
  .danger-card {
    border: 1px solid color-mix(in oklch, var(--danger) 25%, transparent);
    background: color-mix(in oklch, var(--danger-tint) 50%, #fff);
    border-radius: 14px;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: oklch(0.22 0.012 80 / 0.4);
    backdrop-filter: blur(6px);
    z-index: 50;
    display: flex; align-items: center; justify-content: center;
    animation: backdrop-in .2s ease both;
  }
  @keyframes backdrop-in { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: #fff;
    border-radius: 18px;
    border: 1px solid var(--line);
    box-shadow: 0 30px 80px -20px rgba(0,0,0,.3);
    width: 100%;
    max-width: 480px;
    padding: 24px 26px;
    animation: modal-in .25s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes modal-in { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

  /* Rise */
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .rise { animation: rise .45s cubic-bezier(.2,.7,.2,1) both; }
  .rise-stagger > * { animation: rise .45s cubic-bezier(.2,.7,.2,1) both; }
  .rise-stagger > *:nth-child(2) { animation-delay: .07s; }
  .rise-stagger > *:nth-child(3) { animation-delay: .14s; }
  .rise-stagger > *:nth-child(4) { animation-delay: .21s; }
  .rise-stagger > *:nth-child(5) { animation-delay: .28s; }
  .rise-stagger > *:nth-child(6) { animation-delay: .35s; }

  .hr { height: 1px; background: var(--line); }
  kbd { font-family: 'Geist Mono', monospace; font-size: 11px; background: #fff; border: 1px solid var(--line); padding: 1.5px 6px; border-radius: 5px; box-shadow: 0 1px 0 rgba(0,0,0,.04); color: var(--ink-soft); }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="dashboard-data.jsx"></script>
  <script type="text/babel" src="dashboard-widgets.jsx"></script>
  <script type="text/babel" src="shared-nav.jsx"></script>
  <script type="text/babel" src="settings-app.jsx"></script>
</body>
</html>
