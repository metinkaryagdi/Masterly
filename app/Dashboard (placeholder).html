<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Training Platform — Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: oklch(0.992 0.004 95);
    --bg-warm: oklch(0.975 0.012 88);
    --ink: oklch(0.22 0.012 80);
    --ink-soft: oklch(0.46 0.012 80);
    --ink-mute: oklch(0.66 0.010 80);
    --line: oklch(0.92 0.006 85);
    --accent: oklch(0.62 0.14 155);
    --accent-ink: oklch(0.32 0.10 155);
    --accent-tint: oklch(0.95 0.04 155);
  }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: grid;
    place-items: center;
    padding: 32px;
  }
  .card {
    max-width: 520px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 32px 36px;
    box-shadow: 0 30px 80px -40px rgba(0,0,0,.18), 0 2px 6px -3px rgba(0,0,0,.06);
  }
  .mark {
    width: 32px; height: 32px;
    background: var(--ink); color: var(--bg);
    border-radius: 9px;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Geist Mono', monospace;
    font-weight: 600; font-size: 16px; letter-spacing: -0.04em;
  }
  .tag {
    display: inline-block;
    background: var(--accent-tint);
    color: var(--accent-ink);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    letter-spacing: 0.02em;
  }
  h1 { font-size: 26px; letter-spacing: -0.025em; margin: 18px 0 6px; font-weight: 600; line-height: 1.15; }
  p  { color: var(--ink-soft); line-height: 1.55; font-size: 14.5px; margin: 0; }
  .row { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--line); }
  .kv { font-family: 'Geist Mono', monospace; font-size: 11.5px; color: var(--ink-mute); }
  .kv b { color: var(--ink); font-weight: 500; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    height: 36px; padding: 0 14px;
    background: var(--ink); color: #fff;
    border-radius: 9px; font-size: 13.5px; font-weight: 500;
    text-decoration: none;
    border: 0;
  }
  .btn:hover { background: oklch(0.30 0.012 80); }
  .btn.ghost { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  .btn.ghost:hover { background: oklch(0.985 0.005 88); }
  .actions { display:flex; gap:10px; margin-top: 22px; }
</style>
</head>
<body>
  <div class="card">
    <div style="display:flex; align-items:center; gap:10px;">
      <div class="mark">T</div>
      <div style="font-weight:600; letter-spacing:-0.015em;">Training Platform</div>
      <span class="tag" style="margin-left:6px;">placeholder</span>
    </div>

    <h1>You're signed in.</h1>
    <p>The dashboard isn't built yet — this page is here so the auth redirect works end-to-end. Your JWT is in <code style="font-family:'Geist Mono',monospace; background:oklch(0.96 0.006 88); padding:1px 6px; border-radius:5px; font-size:12.5px;">localStorage.training_token</code>.</p>

    <div class="row">
      <div class="kv">user: <b id="who">—</b></div>
      <div class="kv">token: <b id="tok">—</b></div>
    </div>

    <div class="actions">
      <a class="btn" href="Auth.html">Back to sign in</a>
      <button class="btn ghost" id="signout" type="button">Sign out</button>
    </div>
  </div>

  <script>
    (function () {
      const tok = localStorage.getItem('training_token');
      let user = {};
      try { user = JSON.parse(localStorage.getItem('training_user') || '{}'); } catch {}
      document.getElementById('who').textContent = user.displayName
        ? `${user.displayName} <${user.email}>`
        : 'not signed in';
      document.getElementById('tok').textContent = tok
        ? tok.slice(0, 18) + '…'
        : 'none';
      document.getElementById('signout').addEventListener('click', () => {
        localStorage.removeItem('training_token');
        localStorage.removeItem('training_user');
        window.location.href = 'Auth.html';
      });
    })();
  </script>
</body>
</html>
