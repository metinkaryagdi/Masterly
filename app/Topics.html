<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Masterly — Topics</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { fontFamily: {
    sans: ['Geist', 'ui-sans-serif', 'system-ui', 'sans-serif'],
    mono: ['Geist Mono', 'ui-monospace', 'monospace'],
  }}}};
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg: oklch(0.992 0.004 95);
    --bg-warm: oklch(0.975 0.012 88);
    --surface: #ffffff;
    --ink: oklch(0.22 0.012 80);
    --ink-soft: oklch(0.46 0.012 80);
    --ink-mute: oklch(0.66 0.010 80);
    --line: oklch(0.92 0.006 85);
    --line-strong: oklch(0.85 0.008 85);
    --accent: oklch(0.62 0.14 155);
    --accent-ink: oklch(0.32 0.10 155);
    --accent-tint: oklch(0.95 0.04 155);
    --danger: oklch(0.58 0.18 25);
    --warn: oklch(0.70 0.13 70);
  }
  html, body, #root { min-height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
    font-feature-settings: 'ss01', 'cv11';
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  *::selection { background: color-mix(in oklch, var(--accent) 30%, transparent); }

  .tp-mark {
    width: 28px; height: 28px;
    background: var(--ink); color: oklch(0.99 0.01 90);
    border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Geist Mono', monospace;
    font-weight: 600; font-size: 14px; letter-spacing: -0.04em;
  }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; }
  .eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--ink-mute);
  }
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: color-mix(in oklch, var(--bg) 80%, transparent);
    backdrop-filter: saturate(160%) blur(14px);
    -webkit-backdrop-filter: saturate(160%) blur(14px);
    border-bottom: 1px solid var(--line);
  }
  .nav-tab {
    position: relative;
    padding: 8px 12px; border-radius: 8px;
    font-size: 13.5px; font-weight: 500;
    color: var(--ink-soft);
    transition: color .15s ease, background .15s ease;
  }
  .nav-tab:hover { color: var(--ink); }
  .nav-tab[data-active="true"] { color: var(--ink); background: oklch(0.95 0.006 88); }
  .nav-tab[data-active="true"]::after {
    content: ''; position: absolute; left: 12px; right: 12px; bottom: -1px;
    height: 2px; background: var(--ink); border-radius: 2px;
  }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    height: 36px; padding: 0 14px;
    border-radius: 9px;
    font-size: 13.5px; font-weight: 500;
    letter-spacing: -0.005em;
    transition: background .15s ease, border-color .15s ease, transform .08s ease;
  }
  .btn-lg { height: 44px; padding: 0 20px; font-size: 14px; }
  .btn-primary { background: var(--ink); color: #fff; box-shadow: 0 1px 0 rgba(255,255,255,.06) inset, 0 1px 2px rgba(0,0,0,.08); }
  .btn-primary:hover:not(:disabled) { background: oklch(0.30 0.012 80); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-ghost { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  .btn-ghost:hover { border-color: var(--line-strong); background: oklch(0.985 0.005 88); }
  .btn-soft { background: var(--accent-tint); color: var(--accent-ink); }
  .btn-icon {
    width: 32px; height: 32px; padding: 0;
    background: #fff; color: var(--ink-soft);
    border: 1px solid var(--line); border-radius: 9px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .15s ease, color .15s ease;
  }
  .btn-icon:hover { background: oklch(0.985 0.005 88); color: var(--ink); }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 999px;
    background: linear-gradient(135deg, oklch(0.7 0.10 160), oklch(0.55 0.13 220));
    color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Geist Mono', monospace;
    font-size: 11.5px; font-weight: 600; letter-spacing: -0.02em;
  }

  .container-x { max-width: 1320px; margin: 0 auto; padding: 0 28px; }
  @media (max-width: 980px) { .container-x { padding: 0 16px; } }

  .hr { height: 1px; background: var(--line); }

  /* Topic list item */
  .tlist-item {
    display: grid;
    grid-template-columns: 40px 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 12px 14px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease, transform .12s ease, box-shadow .15s ease;
    width: 100%;
    text-align: left;
    color: var(--ink);
  }
  .tlist-item:hover { border-color: var(--line-strong); transform: translateY(-1px); }
  .tlist-item[data-selected="true"] {
    background: oklch(0.985 0.006 88);
    border-color: var(--ink);
    box-shadow: 0 0 0 3px oklch(0.93 0.01 85);
  }
  .tlist-item[data-selected="true"]:hover { transform: none; }

  .badge-num {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: oklch(0.965 0.006 88);
    border: 1px solid var(--line);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Geist Mono', monospace;
    font-size: 12.5px; font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.02em;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .tlist-item[data-selected="true"] .badge-num {
    background: var(--ink); color: #fff; border-color: var(--ink);
  }

  .mbar { height: 5px; border-radius: 999px; background: oklch(0.94 0.006 85); overflow: hidden; }
  .mbar > i { display: block; height: 100%; border-radius: 999px; background: var(--accent); transition: width 1.1s cubic-bezier(.2,.7,.2,1); }

  /* Topic chip */
  .topic-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px;
    border-radius: 999px;
    background: oklch(0.965 0.006 88);
    border: 1px solid var(--line);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: -0.01em;
    white-space: nowrap;
    cursor: pointer;
    transition: border-color .15s ease;
  }
  .topic-chip:hover { border-color: var(--line-strong); }

  /* Difficulty pips */
  .difpip { display: inline-flex; gap: 3px; align-items: center; }
  .difpip i { width: 5px; height: 5px; border-radius: 999px; background: oklch(0.88 0.006 85); }
  .difpip i[data-on="true"] { background: var(--ink); }

  /* Skeleton */
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .skel { background: linear-gradient(90deg, oklch(0.95 0.006 88) 0%, oklch(0.97 0.006 88) 50%, oklch(0.95 0.006 88) 100%); background-size: 200% 100%; animation: shimmer 1.4s linear infinite; border-radius: 8px; }

  /* Sample question row */
  .sq-row {
    display: grid;
    grid-template-columns: 32px 1fr auto auto;
    gap: 12px;
    align-items: center;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #fff;
    cursor: pointer;
    transition: border-color .15s ease, transform .12s ease, background .15s ease;
  }
  .sq-row:hover { border-color: var(--line-strong); transform: translateY(-1px); background: oklch(0.985 0.005 88); }
  .type-tile-sm { width: 28px; height: 28px; border-radius: 8px; display:inline-flex; align-items:center; justify-content:center; }
  .type-tile-sm.question  { background: oklch(0.95 0.04 155); color: oklch(0.32 0.10 155); }
  .type-tile-sm.coding    { background: oklch(0.95 0.04 240); color: oklch(0.32 0.13 240); }
  .type-tile-sm.scenario  { background: oklch(0.95 0.05 60);  color: oklch(0.42 0.14 60); }

  /* Filter/sort segmented */
  .seg {
    display: inline-flex;
    background: oklch(0.96 0.006 88);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 2px;
    gap: 2px;
  }
  .seg button {
    height: 28px; padding: 0 12px;
    border-radius: 7px;
    font-size: 12.5px; font-weight: 500;
    color: var(--ink-soft);
    transition: background .15s ease, color .15s ease;
  }
  .seg button[data-active="true"] {
    background: #fff; color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,.05);
  }
  .seg button:hover:not([data-active="true"]) { color: var(--ink); }

  /* Rise */
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .rise { animation: rise .45s cubic-bezier(.2,.7,.2,1) both; }

  /* Dependency chip */
  .dep-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 10px 5px 8px;
    background: #fff; border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 12px; color: var(--ink-soft);
    cursor: pointer;
    transition: border-color .15s ease, color .15s ease;
  }
  .dep-chip:hover { border-color: var(--line-strong); color: var(--ink); }
  .dep-arrow { color: var(--ink-mute); font-size: 11px; font-family: 'Geist Mono', monospace; }

  /* Risk badge (shared) */
  .risk-low  { background: oklch(0.96 0.04 155); color: oklch(0.38 0.10 155); }
  .risk-med  { background: oklch(0.95 0.05 70);  color: oklch(0.42 0.13 70); }
  .risk-high { background: oklch(0.96 0.05 25);  color: oklch(0.46 0.16 25); }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="dashboard-data.jsx"></script>
  <script type="text/babel" src="dashboard-widgets.jsx"></script>
  <script type="text/babel" src="shared-nav.jsx"></script>
  <script type="text/babel" src="topics-app.jsx"></script>
</body>
</html>
