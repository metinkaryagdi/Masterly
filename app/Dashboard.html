<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Training Platform — Today</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Geist', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          mono: ['Geist Mono', 'ui-monospace', 'monospace'],
        },
      },
    },
  };
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg: oklch(0.992 0.004 95);
    --bg-warm: oklch(0.975 0.012 88);
    --surface: #ffffff;
    --ink: oklch(0.22 0.012 80);
    --ink-soft: oklch(0.46 0.012 80);
    --ink-mute: oklch(0.66 0.010 80);
    --line: oklch(0.92 0.006 85);
    --line-strong: oklch(0.85 0.008 85);
    --accent: oklch(0.62 0.14 155);
    --accent-ink: oklch(0.32 0.10 155);
    --accent-tint: oklch(0.95 0.04 155);
    --danger: oklch(0.58 0.18 25);
    --warn: oklch(0.70 0.13 70);
    --info: oklch(0.60 0.12 240);
  }
  html, body, #root { min-height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
    font-feature-settings: 'ss01', 'cv11';
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  *::selection { background: color-mix(in oklch, var(--accent) 30%, transparent); }

  /* Brand mark */
  .tp-mark {
    width: 28px; height: 28px;
    background: var(--ink);
    color: oklch(0.99 0.01 90);
    border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Geist Mono', monospace;
    font-weight: 600; font-size: 14px; letter-spacing: -0.04em;
  }

  /* Card surface */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
  }
  .card-pad { padding: 22px 24px; }

  /* Section eyebrow */
  .eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-mute);
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    height: 36px; padding: 0 14px;
    border-radius: 9px;
    font-size: 13.5px; font-weight: 500;
    letter-spacing: -0.005em;
    transition: background .15s ease, border-color .15s ease, transform .08s ease;
  }
  .btn-primary {
    background: var(--ink); color: #fff;
    box-shadow: 0 1px 0 rgba(255,255,255,.06) inset, 0 1px 2px rgba(0,0,0,.08);
  }
  .btn-primary:hover { background: oklch(0.30 0.012 80); }
  .btn-primary:active { transform: translateY(0.5px); }
  .btn-ghost {
    background: #fff; color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn-ghost:hover { border-color: var(--line-strong); background: oklch(0.985 0.005 88); }
  .btn-soft {
    background: var(--accent-tint); color: var(--accent-ink);
  }
  .btn-soft:hover { background: color-mix(in oklch, var(--accent) 15%, transparent); }
  .btn-icon {
    width: 32px; height: 32px; padding: 0;
    background: #fff; color: var(--ink-soft);
    border: 1px solid var(--line);
    border-radius: 9px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .15s ease, color .15s ease;
  }
  .btn-icon:hover { background: oklch(0.985 0.005 88); color: var(--ink); }

  /* Nav */
  .nav-tab {
    position: relative;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink-soft);
    transition: color .15s ease, background .15s ease;
  }
  .nav-tab:hover { color: var(--ink); }
  .nav-tab[data-active="true"] {
    color: var(--ink);
    background: oklch(0.95 0.006 88);
  }
  .nav-tab[data-active="true"]::after {
    content: '';
    position: absolute; left: 12px; right: 12px; bottom: -1px;
    height: 2px; background: var(--ink); border-radius: 2px;
  }

  /* Pill */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px 3px 8px;
    border-radius: 999px;
    font-size: 11.5px; font-weight: 500;
    border: 1px solid var(--line);
    background: #fff;
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--accent); }

  /* Chip (topic) */
  .topic-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px;
    border-radius: 999px;
    background: oklch(0.965 0.006 88);
    border: 1px solid var(--line);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: -0.01em;
    white-space: nowrap;
  }

  /* Plan item row */
  .plan-row {
    display: grid;
    grid-template-columns: 28px 1fr auto auto;
    gap: 14px;
    align-items: center;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: #fff;
    transition: border-color .15s ease, transform .12s ease, background .15s ease;
    cursor: pointer;
  }
  .plan-row:hover { border-color: var(--line-strong); transform: translateY(-1px); }
  .plan-row[data-done="true"] {
    background: oklch(0.985 0.006 88);
    border-style: dashed;
  }
  .plan-row[data-done="true"] .plan-title { color: var(--ink-mute); text-decoration: line-through; text-decoration-color: color-mix(in oklch, var(--ink-mute) 50%, transparent); }
  .plan-row[data-active="true"] {
    border-color: color-mix(in oklch, var(--accent) 50%, transparent);
    box-shadow: 0 0 0 3px var(--accent-tint), 0 2px 6px -3px rgba(0,0,0,.06);
  }

  /* Tiny icon button (item type) */
  .type-tile {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--ink);
  }
  .type-question  { background: oklch(0.95 0.04 155); color: oklch(0.32 0.10 155); }
  .type-coding    { background: oklch(0.95 0.04 240); color: oklch(0.32 0.13 240); }
  .type-scenario  { background: oklch(0.95 0.05 60);  color: oklch(0.42 0.14 60); }

  /* Priority dots */
  .prio-dots { display: inline-flex; gap: 2.5px; align-items: center; }
  .prio-dots i { width: 5px; height: 5px; border-radius: 999px; background: oklch(0.88 0.006 85); }
  .prio-dots i[data-on="true"] { background: var(--ink); }

  /* Grid bg utility */
  .grid-bg {
    background-image:
      linear-gradient(to right, color-mix(in oklch, var(--ink) 5%, transparent) 1px, transparent 1px),
      linear-gradient(to bottom, color-mix(in oklch, var(--ink) 5%, transparent) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* Mastery bar */
  .mbar { height: 5px; border-radius: 999px; background: oklch(0.94 0.006 85); overflow: hidden; }
  .mbar > i { display: block; height: 100%; border-radius: 999px; background: var(--accent); transition: width 1.1s cubic-bezier(.2,.7,.2,1); }

  /* Skeleton */
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .skel { background: linear-gradient(90deg, oklch(0.95 0.006 88) 0%, oklch(0.97 0.006 88) 50%, oklch(0.95 0.006 88) 100%); background-size: 200% 100%; animation: shimmer 1.4s linear infinite; border-radius: 8px; }

  /* Rise-in */
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .rise { animation: rise .45s cubic-bezier(.2,.7,.2,1) both; }
  .rise-stagger > * { animation: rise .45s cubic-bezier(.2,.7,.2,1) both; }
  .rise-stagger > *:nth-child(1) { animation-delay: .02s; }
  .rise-stagger > *:nth-child(2) { animation-delay: .07s; }
  .rise-stagger > *:nth-child(3) { animation-delay: .12s; }
  .rise-stagger > *:nth-child(4) { animation-delay: .17s; }
  .rise-stagger > *:nth-child(5) { animation-delay: .22s; }
  .rise-stagger > *:nth-child(6) { animation-delay: .27s; }
  .rise-stagger > *:nth-child(7) { animation-delay: .32s; }

  /* Risk badge */
  .risk-low  { background: oklch(0.96 0.04 155); color: oklch(0.38 0.10 155); }
  .risk-med  { background: oklch(0.95 0.05 70);  color: oklch(0.42 0.13 70); }
  .risk-high { background: oklch(0.96 0.05 25);  color: oklch(0.46 0.16 25); }

  /* Spark line container */
  .spark { width: 60px; height: 22px; }

  /* User avatar */
  .avatar {
    width: 30px; height: 30px;
    border-radius: 999px;
    background: linear-gradient(135deg, oklch(0.7 0.10 160), oklch(0.55 0.13 220));
    color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Geist Mono', monospace;
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  /* Header */
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: color-mix(in oklch, var(--bg) 80%, transparent);
    backdrop-filter: saturate(160%) blur(14px);
    -webkit-backdrop-filter: saturate(160%) blur(14px);
    border-bottom: 1px solid var(--line);
  }

  /* divider line */
  .hr { height: 1px; background: var(--line); }

  /* Layout helpers */
  .container-x {
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 28px;
  }

  /* Tooltip */
  .tip {
    position: absolute;
    pointer-events: none;
    background: var(--ink);
    color: var(--bg);
    border-radius: 7px;
    padding: 5px 9px;
    font-size: 11.5px;
    font-family: 'Geist Mono', monospace;
    letter-spacing: -0.005em;
    white-space: nowrap;
    transform: translate(-50%, -120%);
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
    z-index: 5;
  }

  /* responsive */
  @media (max-width: 980px) {
    .container-x { padding: 0 16px; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="dashboard-data.jsx"></script>
  <script type="text/babel" src="dashboard-widgets.jsx"></script>
  <script type="text/babel" src="shared-nav.jsx"></script>
  <script type="text/babel" src="dashboard-app.jsx"></script>
</body>
</html>
