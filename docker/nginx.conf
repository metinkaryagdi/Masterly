server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index Auth.html;

    # JSX files are served as text/babel scripts in this prototype; nginx
    # would otherwise return them as application/octet-stream.
    types {
        text/babel jsx;
        text/html  html;
    }
    default_type application/octet-stream;

    location / {
        # Kaynaklar sürümlenmediği için tarayıcının sezgisel önbelleği eski
        # jsx dosyalarını gösterebiliyor; her istekte ETag ile doğrulat.
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /Auth.html;
    }
}
