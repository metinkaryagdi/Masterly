services:
  db:
    image: postgres:16-alpine
    container_name: masterly-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: training_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - training_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d training_platform"]
      interval: 5s
      timeout: 3s
      retries: 10

  runner:
    build:
      context: .
      dockerfile: src/TrainingPlatform.Runner/Dockerfile
    container_name: masterly-runner
    restart: unless-stopped
    # Executes learner-submitted code: keep it resource-capped, without published
    # ports, off the internet (internal network), and with a read-only root plus
    # dropped Linux capabilities. Only /tmp is writable (tmpfs) — the judge builds
    # and runs each submission under Path.GetTempPath(); the warmed NuGet/MSBuild
    # cache on the read-only root is still readable for `dotnet test --no-restore`.
    environment:
      ASPNETCORE_URLS: http://+:8080
    networks:
      - runner_internal
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 1536m
    cpus: 1.5
    pids_limit: 512

  api:
    build:
      context: .
      dockerfile: src/TrainingPlatform.Api/Dockerfile
    container_name: masterly-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      runner:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=training_platform;Username=postgres;Password=postgres"
      Execution__Runner__Enabled: "true"
      Execution__Runner__BaseUrl: "http://runner:8080"
      # AI coaching feedback via a host-side Ollama. Best-effort: when no
      # Ollama is reachable, submissions simply skip the AI feedback section.
      AI__Ollama__Enabled: "${OLLAMA_ENABLED:-true}"
      AI__Ollama__BaseUrl: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      AI__Ollama__Model: "${OLLAMA_MODEL:-gemma3:4b}"
      AI__Ollama__TimeoutSeconds: "120"
      Jwt__SecretKey: "dev-only-please-replace-with-a-32+-char-secret-in-prod"
      Jwt__Issuer: "TrainingPlatform"
      Jwt__Audience: "TrainingPlatform.Client"
      Jwt__ExpiryMinutes: "120"
      # Comma-separated is not supported; supply admins by index. These accounts
      # receive the Admin role claim (question/challenge authoring + AI generation).
      Authorization__AdminEmails__0: "${ADMIN_EMAIL:-admin@masterly.local}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # On both networks: the default bridge reaches db, web and the host-side
    # Ollama; runner_internal reaches the sandboxed judge with no internet path.
    networks:
      - default
      - runner_internal
    ports:
      - "${API_PORT:-5000}:5000"

  web:
    image: nginx:1.27-alpine
    container_name: masterly-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./app:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  # Default bridge with outbound access (db, web, api, host-side Ollama).
  default:
  # No gateway to the outside world: the code runner and the api talk here, but
  # learner-submitted code has no internet egress.
  runner_internal:
    internal: true

volumes:
  training_pgdata:
